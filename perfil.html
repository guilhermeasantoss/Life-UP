<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
<title>Meus Dados - LifeUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  main { max-width: 620px; margin: 40px auto; padding: 0 24px; }

  .perfil-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:16px; overflow:hidden; }

  .perfil-header {
    background: linear-gradient(135deg,#1a0000,#2a0000);
    border-bottom: 2px solid #e50914;
    padding: 28px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .perfil-avatar {
    width:72px; height:72px; background:#111; border-radius:50%;
    border:2px solid #e50914; display:flex; align-items:center;
    justify-content:center; font-size:2rem; flex-shrink:0;
  }
  .perfil-header h2 { font-size:1.2rem; font-weight:700; color:#fff; margin:0 0 4px; }
  .perfil-header p  { font-size:0.82rem; color:#888; margin:0; }

  .perfil-body { padding:28px; }

  .perfil-tabs { display:flex; gap:0; margin-bottom:24px; border-bottom:1px solid #2a2a2a; }
  .perfil-tab {
    padding:10px 20px; font-size:0.85rem; font-weight:600; color:#666;
    cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
    font-family:'Poppins',sans-serif; background:none; border-top:none;
    border-left:none; border-right:none;
  }
  .perfil-tab.ativo { color:#e50914; border-bottom-color:#e50914; }
  .perfil-tab:hover { color:#fff; }

  .perfil-painel { display:none; }
  .perfil-painel.ativo { display:block; }

  .perfil-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .perfil-campo { margin-bottom:4px; }
  .perfil-campo label {
    display:block; font-size:0.72rem; font-weight:600; color:#666;
    text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px;
  }
  .perfil-campo input,
  .perfil-campo select {
    width:100%; background:#111; border:1px solid #2a2a2a; border-radius:8px;
    color:#fff; padding:10px 14px; font-size:0.9rem; font-family:'Poppins',sans-serif;
    outline:none; transition:border-color 0.2s; box-sizing:border-box;
  }
  .perfil-campo input:focus,
  .perfil-campo select:focus { border-color:#e50914; }
  .perfil-campo input[readonly] {
    opacity:0.5; cursor:not-allowed;
  }
  .perfil-campo .campo-hint {
    font-size:0.7rem; color:#555; margin-top:3px;
  }

  .perfil-divider { height:1px; background:#2a2a2a; margin:20px 0; }

  .perfil-acoes { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }

  .btn-perfil {
    padding:10px 20px; border-radius:8px; font-size:0.85rem; font-weight:600;
    font-family:'Poppins',sans-serif; cursor:pointer; text-decoration:none;
    transition:all 0.2s; border:none; display:inline-block;
  }
  .btn-perfil-primary   { background:#e50914; color:#fff; }
  .btn-perfil-primary:hover { background:#ff0a16; }
  .btn-perfil-outline   { background:transparent; border:1px solid #444; color:#aaa; }
  .btn-perfil-outline:hover { border-color:#e50914; color:#e50914; }
  .btn-perfil-green     { background:#00b4a0; color:#fff; }
  .btn-perfil-green:hover { background:#009e8c; }
  .btn-perfil-save {
    width:100%; padding:13px; font-size:0.95rem; background:#e50914;
    color:#fff; border:none; border-radius:8px; font-weight:600;
    font-family:'Poppins',sans-serif; cursor:pointer; transition:background 0.2s;
    margin-top:8px;
  }
  .btn-perfil-save:hover { background:#ff0a16; }

  .perfil-msg { font-size:0.82rem; margin-top:10px; font-family:'Poppins',sans-serif; min-height:18px; }

  .senha-req { font-size:0.75rem; color:#555; margin-top:4px; }
  .senha-req.ok { color:#00c864; }
</style>
</head>
<body>

<header>
  <a href="site.html" class="logo">
    <span class="logo-icon">⚡</span>
    <h1>LifeUp <span class="logo-sub">Suplementos</span></h1>
  </a>
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#888" viewBox="0 0 16 16">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input type="text" placeholder="Pesquisar produtos...">
    <button onclick="window.location.href='loja.html'">Buscar</button>
  </div>
  <nav>
    <a href="loja.html">Produtos</a>
    <a href="entrar.html">Login</a>
    <a href="carrinho.html" class="nav-cart">🛒 Carrinho</a>
  </nav>
</header>

<main>
  <div class="perfil-card">
    <div class="perfil-header">
      <div class="perfil-avatar">👤</div>
      <div>
        <h2 id="perfil-nome-header">Carregando...</h2>
        <p id="perfil-email-header"></p>
      </div>
    </div>
    <div class="perfil-body">

      <!-- Abas -->
      <div class="perfil-tabs">
        <button class="perfil-tab ativo" onclick="trocarAba('dados', this)">Meus Dados</button>
        <button class="perfil-tab" onclick="trocarAba('senha', this)">Alterar Senha</button>
      </div>

      <!-- ── Painel: Meus Dados ── -->
      <div class="perfil-painel ativo" id="painel-dados">
        <div class="perfil-grid">

          <div class="perfil-campo">
            <label>Nome completo</label>
            <input type="text" id="campo-nome" placeholder="Seu nome">
          </div>

          <div class="perfil-campo">
            <label>Email</label>
            <input type="email" id="campo-email" placeholder="seu@email.com">
          </div>

          <div class="perfil-campo">
            <label>CPF</label>
            <input type="text" id="campo-cpf" readonly>
            <p class="campo-hint">CPF não pode ser alterado</p>
          </div>

          <div class="perfil-campo">
            <label>Data de Nascimento</label>
            <input type="date" id="campo-nascimento">
          </div>

          <div class="perfil-campo">
            <label>Telefone</label>
            <input type="text" id="campo-telefone" placeholder="(11) 99999-9999"
              oninput="formatarTelefone(this)">
          </div>

          <div class="perfil-campo" style="grid-column:1/-1">
            <label>Endereço completo</label>
            <input type="text" id="campo-endereco" placeholder="Rua, número, bairro, cidade/UF">
          </div>

        </div>

        <button class="btn-perfil-save" onclick="salvarDados()">💾 Salvar Alterações</button>
        <p class="perfil-msg" id="msg-dados"></p>

        <div class="perfil-divider"></div>

        <div class="perfil-acoes">
          <a href="pedidos.html" class="btn-perfil btn-perfil-primary">📦 Minhas Compras</a>
          <a href="loja.html" class="btn-perfil btn-perfil-outline">🛍️ Continuar Comprando</a>
        </div>
      </div>

      <!-- ── Painel: Alterar Senha ── -->
      <div class="perfil-painel" id="painel-senha">
        <div class="perfil-campo">
          <label>Senha atual</label>
          <input type="password" id="senha-atual" placeholder="Digite sua senha atual">
        </div>
        <div class="perfil-campo">
          <label>Nova senha</label>
          <input type="password" id="senha-nova" placeholder="Mínimo 6 caracteres"
            oninput="validarNovaSenha()">
          <p class="senha-req" id="req-min">• Mínimo 6 caracteres</p>
        </div>
        <div class="perfil-campo">
          <label>Confirmar nova senha</label>
          <input type="password" id="senha-confirmar" placeholder="Repita a nova senha">
        </div>
        <button class="btn-perfil-save" style="background:#00b4a0" onclick="alterarSenha()">
          🔒 Salvar Nova Senha
        </button>
        <p class="perfil-msg" id="msg-senha"></p>
      </div>

    </div>
  </div>
</main>

<footer>
  <div style="text-align:center;padding:20px;border-top:1px solid #e50914;">
    <p style="color:#444;font-size:0.82rem;">© 2025 LifeUp Suplementos. Todos os direitos reservados.</p>
  </div>
</footer>

<script src="script.js"></script>
<script>
let _clienteId = null;

window.addEventListener("DOMContentLoaded", () => {
  const usuario = JSON.parse(localStorage.getItem("usuario_logado"));
  if (!usuario) { window.location.href = "entrar.html"; return; }

  document.getElementById("perfil-nome-header").textContent  = usuario.nome  || "—";
  document.getElementById("perfil-email-header").textContent = usuario.email || "";

  if (usuario.id) {
    _clienteId = usuario.id;
    fetch("http://127.0.0.1:5000/listar/clientes")
      .then(r => r.json())
      .then(clientes => {
        const c = clientes.find(cl => cl.id_clientes === usuario.id);
        if (!c) return;

        document.getElementById("campo-nome").value       = c.nome      || "";
        document.getElementById("campo-email").value      = c.email     || "";
        document.getElementById("campo-cpf").value        = c.cpf
          ? c.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4") : "";
        document.getElementById("campo-nascimento").value = c.data_nascimento
          ? c.data_nascimento.split("T")[0] : "";
        document.getElementById("campo-telefone").value   = c.telefone  || "";
        document.getElementById("campo-endereco").value   = c.endereco  || "";
      })
      .catch(() => {});
  } else {
    // Sem id (cadastro local) — preenche só o que tem
    document.getElementById("campo-nome").value  = usuario.nome  || "";
    document.getElementById("campo-email").value = usuario.email || "";
  }
});

function trocarAba(aba, btn) {
  document.querySelectorAll('.perfil-tab').forEach(b => b.classList.remove('ativo'));
  document.querySelectorAll('.perfil-painel').forEach(p => p.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.getElementById('painel-' + aba).classList.add('ativo');
}

function formatarTelefone(input) {
  let v = input.value.replace(/\D/g,'').substring(0,11);
  if (v.length > 10)      v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if (v.length > 6)  v = `(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6)}`;
  else if (v.length > 2)  v = `(${v.slice(0,2)}) ${v.slice(2)}`;
  input.value = v;
}

function salvarDados() {
  const msg      = document.getElementById('msg-dados');
  const usuario  = JSON.parse(localStorage.getItem("usuario_logado"));
  const nome     = document.getElementById('campo-nome').value.trim();
  const email    = document.getElementById('campo-email').value.trim();
  const nasc     = document.getElementById('campo-nascimento').value;
  const telefone = document.getElementById('campo-telefone').value.trim();
  const endereco = document.getElementById('campo-endereco').value.trim();

  if (!nome || !email) {
    msg.style.color = '#e50914'; msg.textContent = 'Nome e email são obrigatórios.'; return;
  }

  if (!_clienteId) {
    const novo = { ...usuario, nome, email, telefone, endereco };
    localStorage.setItem("usuario_logado", JSON.stringify(novo));
    document.getElementById("perfil-nome-header").textContent  = nome;
    document.getElementById("perfil-email-header").textContent = email;
    msg.style.color = '#00c864'; msg.textContent = '✓ Dados atualizados localmente.';
    return;
  }

  const btnSalvar = document.querySelector('.btn-perfil-save');
  btnSalvar.disabled = true;
  btnSalvar.textContent = 'Salvando...';

  fetch(`http://127.0.0.1:5000/atualizar/clientes/${_clienteId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nome, email, data_nascimento: nasc, telefone, endereco })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) { msg.style.color = '#e50914'; msg.textContent = res.error; return; }
    const novo = { ...usuario, nome, email, telefone, endereco };
    localStorage.setItem("usuario_logado", JSON.stringify(novo));
    document.getElementById("perfil-nome-header").textContent  = nome;
    document.getElementById("perfil-email-header").textContent = email;
    msg.style.color = '#00c864';
    msg.textContent = '✓ Telefone, endereço e demais dados salvos com sucesso!';
  })
  .catch(() => {
    const novo = { ...usuario, nome, email, telefone, endereco };
    localStorage.setItem("usuario_logado", JSON.stringify(novo));
    document.getElementById("perfil-nome-header").textContent  = nome;
    document.getElementById("perfil-email-header").textContent = email;
    msg.style.color = '#e59009';
    msg.textContent = '⚠️ Servidor offline. Dados salvos localmente.';
  })
  .finally(() => {
    btnSalvar.disabled = false;
    btnSalvar.textContent = '💾 Salvar Alterações';
  });
}

function validarNovaSenha() {
  const val = document.getElementById('senha-nova').value;
  const req  = document.getElementById('req-min');
  req.className = 'senha-req' + (val.length >= 6 ? ' ok' : '');
  req.textContent = val.length >= 6 ? '✓ Mínimo 6 caracteres' : '• Mínimo 6 caracteres';
}

function alterarSenha() {
  const atual     = document.getElementById('senha-atual').value;
  const nova      = document.getElementById('senha-nova').value;
  const confirmar = document.getElementById('senha-confirmar').value;
  const msg       = document.getElementById('msg-senha');
  const usuario   = JSON.parse(localStorage.getItem("usuario_logado"));

  if (!atual || !nova || !confirmar) {
    msg.style.color = '#e50914'; msg.textContent = 'Preencha todos os campos.'; return;
  }
  if (nova.length < 6) {
    msg.style.color = '#e50914'; msg.textContent = 'A nova senha deve ter no mínimo 6 caracteres.'; return;
  }
  if (nova !== confirmar) {
    msg.style.color = '#e50914'; msg.textContent = 'As senhas não coincidem.'; return;
  }

  fetch("http://127.0.0.1:5000/alterar/senha", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: usuario.email, senha_atual: atual, senha_nova: nova })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) { msg.style.color = '#e50914'; msg.textContent = res.error; return; }
    msg.style.color = '#00c864'; msg.textContent = '✓ Senha alterada com sucesso!';
    document.getElementById('senha-atual').value = '';
    document.getElementById('senha-nova').value  = '';
    document.getElementById('senha-confirmar').value = '';
  })
  .catch(() => { msg.style.color = '#e50914'; msg.textContent = 'Erro ao conectar com o servidor.'; });
}
</script>
</body>
</html>
