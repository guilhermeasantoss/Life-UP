<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
<title>Login - LifeUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cadastro.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="logo-icon">⚡</span>
    <h1>LifeUp</h1>
  </a>
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#888" viewBox="0 0 16 16">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Pesquisar produtos...">
    <button onclick="window.location.href='loja.html'">Buscar</button>
  </div>
  <nav>
    <a href="index.html">Início</a>
    <a href="loja.html">Produtos</a>
    <a href="cadastro.html">Cadastro</a>
    <a href="carrinho.html" class="nav-cart">🛒 Carrinho</a>
  </nav>
</header>

<div class="form-container">
  <h1>Entrar</h1>
  <span class="form-subtitle">Bem-vindo de volta a LifeUp</span>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="seu@email.com" required onkeydown="if(event.key==='Enter') entrar()">

  <label for="senha">Senha</label>
  <input type="password" id="senha" placeholder="senha" required onkeydown="if(event.key==='Enter') entrar()">

  <button onclick="entrar()">Entrar</button>

  <div class="form-links">
    <a href="cadastro.html">Criar conta</a>
    <a href="#" onclick="abrirRecuperarSenha(event)">Esqueci minha senha</a>
  </div>

  <p id="msg"></p>
</div>

<!-- Modal recuperar senha -->
<div id="modal-recuperar" style="display:none; position:fixed; inset:0; z-index:1000; align-items:center; justify-content:center;">
  <div class="modal-overlay" onclick="fecharRecuperar()"></div>
  <div class="modal-box">
    <h3 style="color:#fff;margin-bottom:8px">Recuperar Senha</h3>
    <p style="color:#888;font-size:0.85rem;margin-bottom:20px">
      Informe seu email e CPF cadastrados para redefinir sua senha.
    </p>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Email</label>
      <input type="email" id="rec-email" placeholder="seu@email.com"
        style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#fff;padding:10px 12px;font-size:0.9rem;font-family:'Poppins',sans-serif;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">CPF</label>
      <input type="text" id="rec-cpf" placeholder="00000000000" maxlength="11"
        style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#fff;padding:10px 12px;font-size:0.9rem;font-family:'Poppins',sans-serif;outline:none;box-sizing:border-box">
    </div>
    <div id="rec-nova-senha-area" style="display:none">
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Nova Senha</label>
        <input type="password" id="rec-nova-senha" placeholder="Mínimo 6 caracteres"
          style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#fff;padding:10px 12px;font-size:0.9rem;font-family:'Poppins',sans-serif;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Confirmar Nova Senha</label>
        <input type="password" id="rec-confirmar-senha" placeholder="Repita a nova senha"
          style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#fff;padding:10px 12px;font-size:0.9rem;font-family:'Poppins',sans-serif;outline:none;box-sizing:border-box">
      </div>
    </div>
    <p id="rec-msg" style="font-size:0.82rem;min-height:18px;font-family:'Poppins',sans-serif;margin-bottom:14px"></p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-outline" onclick="fecharRecuperar()">Cancelar</button>
      <button class="modal-btn modal-btn-primary" id="btn-rec" onclick="verificarIdentidade()">Verificar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Se já está logado, vai direto para a loja
  if (localStorage.getItem("usuario_logado")) {
    window.location.href = "loja.html";
  }

  // Trata retorno do Sign in with Apple e verificação de e-mail
  (function() {
    const params = new URLSearchParams(window.location.search);
    const appleLogin = params.get("apple_login");
    const appleError = params.get("apple_error");
    const token      = params.get("token");
    const verificacao = params.get("verificacao");

    // Verificação de e-mail via token
    if (token) {
      window.location.href = `http://127.0.0.1:5000/verificar?token=${token}`;
      return;
    }

    // Resultado da verificação
    if (verificacao) {
      const msg = document.getElementById("msg");
      const mensagens = {
        ok:            { cor: "#00c864", txt: "✓ E-mail verificado! Você já pode fazer login." },
        ja_verificado: { cor: "#00c864", txt: "Conta já verificada. Faça login." },
        expirado:      { cor: "#e50914", txt: "Link expirado. Faça login para receber um novo." },
        invalido:      { cor: "#e50914", txt: "Link inválido." },
        erro:          { cor: "#e50914", txt: "Erro ao verificar. Tente novamente." }
      };
      const m = mensagens[verificacao] || { cor: "#e50914", txt: "Erro desconhecido." };
      msg.style.color = m.cor;
      msg.innerText = m.txt;
      history.replaceState({}, "", window.location.pathname);
      return;
    }

    if (appleLogin) {
      try {
        const usuario = JSON.parse(decodeURIComponent(appleLogin));
        localStorage.setItem("usuario_logado", JSON.stringify(usuario));
        const msg = document.getElementById("msg");
        msg.style.color = "#00c864";
        msg.innerText = `Bem-vindo, ${usuario.nome}! Redirecionando...`;
        setTimeout(() => { window.location.href = "loja.html"; }, 1200);
      } catch(e) {
        console.error("Erro ao processar login Apple:", e);
      }
    }

    if (appleError) {
      const msg = document.getElementById("msg");
      msg.style.color = "#e50914";
      const erros = {
        "token_invalido": "Falha na verificação com a Apple. Tente novamente.",
        "db_error": "Erro ao salvar sua conta. Tente novamente.",
        "user_cancelled_authorize": "Login cancelado."
      };
      msg.innerText = erros[appleError] || `Erro Apple: ${decodeURIComponent(appleError)}`;
    }

    if (appleLogin || appleError) {
      history.replaceState({}, "", window.location.pathname);
    }
  })();

  // Abre modal de recuperação se veio do cadastro
  if (sessionStorage.getItem('abrirRecuperar')) {
    sessionStorage.removeItem('abrirRecuperar');
    setTimeout(() => { document.getElementById('modal-recuperar').style.display = 'flex'; }, 300);
  }
</script>
<script>
function entrar() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const msg   = document.getElementById("msg");

  if (!email || !senha) {
    msg.style.color = "#e50914";
    msg.innerText = "Preencha todos os campos.";
    return;
  }

  fetch("http://127.0.0.1:5000/login/clientes", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, senha })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) {
      msg.style.color = "#e50914";
      msg.innerText = res.error;
      return;
    }
    // Salva sessão local com dados do cliente
    localStorage.setItem("usuario_logado", JSON.stringify({
      id: res.id_clientes,
      nome: res.nome,
      email: res.email
    }));
    msg.style.color = "#00c864";
    msg.innerText = `Bem-vindo, ${res.nome}! Redirecionando...`;
    setTimeout(() => { window.location.href = "loja.html"; }, 1500);
  })
  .catch(() => {
    msg.style.color = "#e50914";
    msg.innerText = "Erro ao conectar com o servidor. Tente novamente.";
  });
}


function abrirRecuperarSenha(e) {
  e.preventDefault();
  document.getElementById('modal-recuperar').style.display = 'flex';
}
function fecharRecuperar() {
  document.getElementById('modal-recuperar').style.display = 'none';
  document.getElementById('rec-msg').textContent = '';
  document.getElementById('rec-nova-senha-area').style.display = 'none';
  document.getElementById('btn-rec').textContent = 'Verificar';
  document.getElementById('btn-rec').onclick = verificarIdentidade;
}

let _recEmail = '', _recCpf = '';

function verificarIdentidade() {
  const email = document.getElementById('rec-email').value.trim();
  const cpf   = document.getElementById('rec-cpf').value.replace(/\D/g,'');
  const msg   = document.getElementById('rec-msg');

  if (!email || cpf.length !== 11) {
    msg.style.color = '#e50914';
    msg.textContent = 'Informe email e CPF válidos.';
    return;
  }

  fetch("http://127.0.0.1:5000/verificar/identidade", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, cpf })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) { msg.style.color = '#e50914'; msg.textContent = res.error; return; }
    _recEmail = email;
    _recCpf   = cpf;
    msg.style.color = '#00c864';
    msg.textContent = '✓ Identidade confirmada! Defina sua nova senha.';
    document.getElementById('rec-nova-senha-area').style.display = 'block';
    document.getElementById('btn-rec').textContent = 'Salvar Nova Senha';
    document.getElementById('btn-rec').onclick = salvarNovaSenhaRecuperacao;
  })
  .catch(() => { msg.style.color = '#e50914'; msg.textContent = 'Erro ao conectar com o servidor.'; });
}

function salvarNovaSenhaRecuperacao() {
  const nova      = document.getElementById('rec-nova-senha').value;
  const confirmar = document.getElementById('rec-confirmar-senha').value;
  const msg       = document.getElementById('rec-msg');

  if (nova.length < 6) { msg.style.color = '#e50914'; msg.textContent = 'Senha deve ter no mínimo 6 caracteres.'; return; }
  if (nova !== confirmar) { msg.style.color = '#e50914'; msg.textContent = 'As senhas não coincidem.'; return; }

  fetch("http://127.0.0.1:5000/recuperar/senha", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: _recEmail, cpf: _recCpf, senha_nova: nova })
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) { msg.style.color = '#e50914'; msg.textContent = res.error; return; }
    msg.style.color = '#00c864';
    msg.textContent = '✓ Senha redefinida! Você já pode fazer login.';
    setTimeout(fecharRecuperar, 2000);
  })
  .catch(() => { msg.style.color = '#e50914'; msg.textContent = 'Erro ao conectar com o servidor.'; });
}
</script>
</body>
</html>
